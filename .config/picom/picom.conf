# ~/.config/picom/picom.conf

# Backend (glx is faster and supports transparency well)
backend = "glx";

# Disable everything except basic transparency
vsync = true;

# === DISABLE ALL VISUAL EFFECTS ===
shadow = false;
fading = false;
#blur = true;
corner-radius = 0;
transition-length = 0;

# === ENSURE i3bar RESPECTS ALPHA ===
# (This is the key: don't force opaque background)
opacity-rule = [];
inactive-opacity-override = false;

# Optional: reduce GPU load
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = false;
detect-client-opacity = true;
detect-transient = true;
detect-client-leader = true;

blur-method = "dual_kawase"
blur-strength = 6
blur-background = true
blur-background_fixed = true
#opacity-rule = [ "80:class_g = 'firefox'" ]
